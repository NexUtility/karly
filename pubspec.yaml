publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.11.1
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1
  intl: ^0.20.1
  shared_preferences: ^2.3.4
  decimal: ^3.0.2

  # PDF report + system share
  pdf: ^3.11.2
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
